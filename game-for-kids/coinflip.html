<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip - Game for Kids</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f8ff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        h1 { margin-bottom: 10px; }
        #coin {
            font-size: 4.2rem;
            margin: 30px 0 10px 0;
            width: 110px; height: 110px;
            display: flex; align-items: center; justify-content: center;
            background: #fff; border: 3px solid #333; border-radius: 50%;
            box-shadow: 2px 4px 12px #b0c4de;
            transition: background 0.2s, transform 0.4s cubic-bezier(.68,-0.55,.27,1.55);
            user-select: none;
        }
        #coin.flipping { animation: flip 0.5s; }
        @keyframes flip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(360deg); }
        }
        #result-label {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2196f3;
            min-height: 32px;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-align: center;
        }
        #flip-btn { padding: 10px 28px; font-size: 1.2rem; border-radius: 8px; border: none; background: #2196f3; color: #fff; cursor: pointer; transition: background 0.2s; }
        #flip-btn:hover { background: #1565c0; }
    </style>
</head>
<body>
    <h1>Coin Flip</h1>
    <div id="coin">🪙</div>
    <div id="result-label"></div>
    <button id="flip-btn">Flip Coin</button>
    <script>
        const coinDiv = document.getElementById('coin');
        const flipBtn = document.getElementById('flip-btn');
        const resultLabel = document.getElementById('result-label');
        const faces = [
            {emoji: '🙂', label: 'Heads', color: '#388e3c'},
            {emoji: '🦉', label: 'Tails', color: '#e65100'}
        ];
        function flipCoin() {
            coinDiv.classList.add('flipping');
            setTimeout(() => {
                const n = Math.floor(Math.random() * 2);
                coinDiv.textContent = faces[n].emoji;
                resultLabel.textContent = faces[n].label;
                resultLabel.style.color = faces[n].color;
                coinDiv.classList.remove('flipping');
            }, 400);
        }
        flipBtn.addEventListener('click', flipCoin);
        // Initial state
        coinDiv.textContent = '🪙';
        resultLabel.textContent = '';
    </script>
</body>
</html>
