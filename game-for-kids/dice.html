<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller - Game for Kids</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f8ff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        h1 { margin-bottom: 10px; }
        #dice { font-size: 5rem; margin: 30px 0; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; background: #fff; border: 3px solid #333; border-radius: 16px; box-shadow: 2px 4px 12px #b0c4de; transition: background 0.2s; }
        #roll-btn { padding: 10px 28px; font-size: 1.2rem; border-radius: 8px; border: none; background: #4caf50; color: #fff; cursor: pointer; transition: background 0.2s; }
        #roll-btn:hover { background: #388e3c; }
    </style>
</head>
<body>
    <h1>Dice Roller</h1>
    <div id="dice">🎲</div>
    <button id="roll-btn">Roll Dice</button>
    <script>
        const diceDiv = document.getElementById('dice');
        const rollBtn = document.getElementById('roll-btn');
        const diceFaces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
        rollBtn.addEventListener('click', () => {
            const n = Math.floor(Math.random() * 6);
            diceDiv.textContent = diceFaces[n];
        });
    </script>
</body>
</html>
