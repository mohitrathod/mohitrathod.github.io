<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Game for Kids</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f8ff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        h1 { margin-bottom: 10px; }
        #game-board { display: grid; grid-template-columns: repeat(3, 80px); grid-template-rows: repeat(3, 80px); gap: 8px; margin-bottom: 20px; }
        .cell {
            width: 80px; height: 80px; background: #fff; border: 2px solid #333; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s;
        }
        .cell:hover { background: #e0f7fa; }
        #status { font-size: 1.2rem; margin-bottom: 12px; min-height: 24px; }
        #reset-btn { padding: 8px 18px; font-size: 1rem; border-radius: 5px; border: none; background: #4caf50; color: #fff; cursor: pointer; transition: background 0.2s; }
        #reset-btn:hover { background: #388e3c; }
    </style>
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <div id="status"></div>
    <div id="game-board"></div>
    <button id="reset-btn">Restart</button>
    <script>
        const board = Array(9).fill(null);
        let currentPlayer = 'X';
        let gameActive = true;
        const statusDiv = document.getElementById('status');
        const boardDiv = document.getElementById('game-board');
        const resetBtn = document.getElementById('reset-btn');

        function renderBoard() {
            boardDiv.innerHTML = '';
            board.forEach((cell, idx) => {
                const cellDiv = document.createElement('div');
                cellDiv.className = 'cell';
                cellDiv.textContent = cell || '';
                cellDiv.addEventListener('click', () => handleMove(idx));
                boardDiv.appendChild(cellDiv);
            });
        }

        function handleMove(idx) {
            if (!gameActive || board[idx]) return;
            board[idx] = currentPlayer;
            if (checkWinner()) {
                statusDiv.textContent = `Player ${currentPlayer} wins! 🎉`;
                gameActive = false;
            } else if (board.every(cell => cell)) {
                statusDiv.textContent = "It's a draw!";
                gameActive = false;
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                statusDiv.textContent = `Player ${currentPlayer}'s turn`;
            }
            renderBoard();
        }

        function checkWinner() {
            const winPatterns = [
                [0,1,2],[3,4,5],[6,7,8], // rows
                [0,3,6],[1,4,7],[2,5,8], // cols
                [0,4,8],[2,4,6]          // diags
            ];
            return winPatterns.some(pattern => {
                const [a,b,c] = pattern;
                return board[a] && board[a] === board[b] && board[a] === board[c];
            });
        }

        resetBtn.addEventListener('click', () => {
            for (let i = 0; i < 9; i++) board[i] = null;
            currentPlayer = 'X';
            gameActive = true;
            statusDiv.textContent = `Player X's turn`;
            renderBoard();
        });

        // Initial render
        statusDiv.textContent = `Player X's turn`;
        renderBoard();
    </script>
</body>
</html>
