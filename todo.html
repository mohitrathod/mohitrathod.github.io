<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="public, max-age=604800">
    <title>To-Do List Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6ef;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative; /* Ensure position context for note */
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            background: #f6f6ef;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); /* Responsive grid */
            gap: 10px; /* Space between items */
        }

        li {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            display: flex;
            margin: 8px;
            align-items: center;
            justify-content: space-between;
            transition: box-shadow 0.2s ease;
        }

        li span {
            font-size: 16px;
            color: #000;
            flex-grow: 1;
        }

        .highlight {
            background-color: yellow;
        }

        .edit-btn, .delete-btn, .up-btn, .down-btn {
            margin-left: 10px;
            cursor: pointer;
            border: none;
            background: none;
            border: 1px solid #bbb; /* Softer border */
            border-radius: 4px;
        }

        .button-container {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .import-btn, .export-btn, .toggle-edit-btn {
            display: inline-block;
            padding: 8px;
            background-color: #d3d3d3;
            color: #555;
            border: 1px solid #bbb;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }

        .import-btn:hover, .export-btn:hover, .toggle-edit-btn:hover {
            background-color: #c0c0c0;
            color: #333;
        }

        .add-task-btn {
            display: none; /* Initially hidden */
            padding: 8px;
            margin-bottom: 10px;
            margin-top: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
        }

        .add-task-btn:hover {
            background-color: #45a049;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            z-index: 10;
            width: 300px;
        }

        .modal input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9;
        }

        /* Show Add Task button when in edit mode */
        .edit-mode .add-task-btn {
            display: block;
        }

        /* Show action buttons in edit mode */
        .edit-mode ul li span {
            margin-right: 30px;
        }

        .edit-mode ul li .edit-btn,
        .edit-mode ul li .delete-btn,
        .edit-mode ul li .up-btn,
        .edit-mode ul li .down-btn {
            display: inline-block;
        }

        /* Hide action buttons in view mode */
        ul li .edit-btn,
        ul li .delete-btn,
        ul li .up-btn,
        ul li .down-btn {
            display: none;
        }

        .task-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            width: 300px;
        }

        .task-modal input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .task-modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .task-modal-buttons button {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .save-task-btn {
            background-color: #4CAF50;
            color: #fff;
        }

        .cancel-task-btn {
            background-color: #f44336;
            color: #fff;
        }

        .task-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 500;
        }

        /* Styles for buttons */
        .up-btn {
            background-color: green;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .down-btn {
            background-color: blue;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .edit-btn {
            background-color: grey;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Button hover effects */
        .up-btn:hover {
            background-color: darkgreen;
        }

        .down-btn:hover {
            background-color: darkblue;
        }

        .edit-btn:hover {
            background-color: darkgrey;
        }

        .delete-btn:hover {
            background-color: darkred;
        }

        .footer-note {
            color: #555;
            text-decoration: none;
            text-align:right;position:absolute;
            bottom: 0;
            right: 0;
        }

        textarea {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            resize: vertical;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        li span {
            font-size: 16px;
            color: #000;
            flex-grow: 1;
            white-space: pre-wrap; /* Preserve line breaks in task descriptions */
        }

        /* Style for clickable links */
        a {
            color: blue;
            text-decoration: underline;
        }

        .link-text {
            color: blue;
            text-decoration: underline;
            cursor: pointer;
        }

        .link-text:hover {
            color: darkblue;
        }

        /* === Clock === */
        #retro-clock {
            position: fixed;
            top: 10px;
            right: 15px;
            font-size: 14px;
            font-family: monospace;
            color: #333;
            background: rgba(255,255,255,0.85);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 10px;
            z-index: 100;
            letter-spacing: 1px;
        }

        /* === Settings Button === */
        #settings-btn {
            position: fixed;
            bottom: 60px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: #d3d3d3;
            border: 1px solid #bbb;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #settings-btn:hover { background: #c0c0c0; }

        /* === Settings Panel === */
        #settings-panel {
            display: none;
            position: fixed;
            bottom: 110px;
            right: 15px;
            width: 220px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            z-index: 199;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        #settings-panel h3 {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        .settings-section-title {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .theme-options { display: flex; flex-direction: column; gap: 6px; }
        .theme-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            font-size: 13px;
            color: #444;
            background: #f9f9f9;
        }
        .theme-option:hover { background: #f0f0f0; }
        .theme-option.active {
            border-color: #4CAF50;
            background: #f0fff0;
            color: #2a6a2a;
        }
        .theme-option input[type="radio"] { accent-color: #4CAF50; margin: 0; }

        /* === Retro Nokia Theme === */
        body.theme-nokia {
            background-color: #8a9870 !important;
            background-image: repeating-linear-gradient(
                0deg, transparent, transparent 3px,
                rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
            ) !important;
            font-family: 'VT323', monospace !important;
            color: #1c2814 !important;
        }
        body.theme-nokia .container {
            background: #9aae82 !important;
            border: 2px solid #2a3a18 !important;
            border-radius: 0 !important;
            box-shadow: inset 1px 1px 0 #c0d4a8, inset -1px -1px 0 #4a5a3a !important;
        }
        body.theme-nokia h1 {
            color: #1c2814 !important;
            font-family: 'VT323', monospace !important;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 2.2em;
            border-bottom: 2px solid #2a3a18;
            padding-bottom: 5px;
        }
        body.theme-nokia li {
            background: #9aae82 !important;
            border: 1px solid #2a3a18 !important;
            border-radius: 0 !important;
        }
        body.theme-nokia li span,
        body.theme-nokia .footer-note {
            color: #1c2814 !important;
            font-family: 'VT323', monospace !important;
            font-size: 19px !important;
        }
        body.theme-nokia input[type="text"],
        body.theme-nokia textarea {
            background: #b0c498 !important;
            border: 1px solid #2a3a18 !important;
            border-radius: 0 !important;
            color: #1c2814 !important;
            font-family: 'VT323', monospace !important;
            font-size: 18px !important;
        }
        body.theme-nokia button {
            border-radius: 0 !important;
            font-family: 'VT323', monospace !important;
            font-size: 17px !important;
        }
        body.theme-nokia .import-btn,
        body.theme-nokia .export-btn,
        body.theme-nokia .toggle-edit-btn {
            background-color: #7a8e64 !important;
            color: #1c2814 !important;
            border: 1px solid #2a3a18 !important;
        }
        body.theme-nokia .add-task-btn { background-color: #4a6a30 !important; }
        body.theme-nokia .task-modal,
        body.theme-nokia .modal {
            background-color: #9aae82 !important;
            border: 2px solid #2a3a18 !important;
            border-radius: 0 !important;
        }
        body.theme-nokia .save-task-btn { background-color: #4a6a30 !important; }
        body.theme-nokia .cancel-task-btn { background-color: #5a3a2a !important; }
        body.theme-nokia #retro-clock {
            background: #7a8e64 !important;
            border: 1px solid #2a3a18 !important;
            color: #1c2814 !important;
            font-family: 'VT323', monospace !important;
            font-size: 22px !important;
            letter-spacing: 2px;
            border-radius: 0 !important;
        }
        body.theme-nokia #settings-btn {
            background: #7a8e64 !important;
            border: 1px solid #2a3a18 !important;
            border-radius: 0 !important;
            color: #1c2814 !important;
        }
        body.theme-nokia #settings-panel {
            background: #9aae82 !important;
            border: 2px solid #2a3a18 !important;
            border-radius: 0 !important;
        }
        body.theme-nokia #settings-panel h3,
        body.theme-nokia .settings-section-title {
            color: #1c2814 !important;
            font-family: 'VT323', monospace !important;
            border-color: #2a3a18 !important;
        }
        body.theme-nokia .theme-option {
            background: #8a9e72 !important;
            border-color: #2a3a18 !important;
            color: #1c2814 !important;
            font-family: 'VT323', monospace !important;
            border-radius: 0 !important;
        }
        body.theme-nokia .theme-option.active {
            background: #6a8050 !important;
            border-color: #1c2814 !important;
        }
    </style>
</head>
<body>
    <!-- Clock -->
    <div id="retro-clock"></div>

    <!-- Settings Button -->
    <button id="settings-btn" title="Settings">&#9881;</button>

    <!-- Settings Panel -->
    <div id="settings-panel">
        <h3>&#9881; Settings</h3>
        <div class="settings-section-title">Theme</div>
        <div class="theme-options">
            <label class="theme-option active" id="theme-default-opt">
                <input type="radio" name="theme" value="default" checked> Default
            </label>
            <label class="theme-option" id="theme-nokia-opt">
                <input type="radio" name="theme" value="nokia"> &#128241; Retro Nokia
            </label>
        </div>
    </div>

    <div class="container">
        <ul id="todo-list"></ul>
        <div class="button-container">
            <button id="add-task-btn" class="add-task-btn">Add New Task</button>
        </div>
        <div class="button-container">
            <button id="import-file-btn" class="import-btn">Import from File</button>
            <input type="file" id="file-input" style="display:none" accept=".json">
            <button id="export-file-btn" class="export-btn">Export to File</button>
            <button id="toggle-edit-btn" class="toggle-edit-btn">Edit Mode</button>
        </div>
    </div>

    <div class="task-modal-overlay" id="task-modal-overlay"></div>
    <div class="task-modal" id="task-modal">
        <h3>Add New Task</h3>
        <!-- Updated to textarea for multiline input -->
        <textarea id="task-input" placeholder="Task Description" rows="4"></textarea>
        <div class="task-modal-buttons">
            <button class="save-task-btn" id="save-task-btn">Save</button>
            <button class="cancel-task-btn" id="cancel-task-btn">Cancel</button>
        </div>
    </div>

    <div class="footer-note">
        destroyable, privacy-oriented, open-source To-Do list.
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const todoList = document.getElementById('todo-list');
        const addTaskBtn = document.getElementById('add-task-btn');
        const toggleEditBtn = document.getElementById('toggle-edit-btn');
        const taskModal = document.getElementById('task-modal');
        const taskModalOverlay = document.getElementById('task-modal-overlay');
        const saveTaskBtn = document.getElementById('save-task-btn');
        const cancelTaskBtn = document.getElementById('cancel-task-btn');
        const taskInput = document.getElementById('task-input');

        const importFileBtn = document.getElementById('import-file-btn');
        const exportFileBtn = document.getElementById('export-file-btn');
        const fileInput = document.getElementById('file-input');

        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let editMode = false;
        let isEditing = false;
        let currentEditIndex = null;

        importFileBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', importTasksFromFile);
        exportFileBtn.addEventListener('click', exportTasksToFile);

        // Detect URLs in the task text
        function parseTaskText(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, '<a href="$1" target="_blank">link</a>');
        }

        // Function to render tasks
        function renderTasks() {
            todoList.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                const taskText = editMode ? task : parseTaskText(task); // Render links only in view mode
                li.innerHTML = `
                    <span>${taskText}</span>
                    <button class="up-btn" style="display: ${editMode ? 'inline-block' : 'none'};">Up</button>
                    <button class="down-btn" style="display: ${editMode ? 'inline-block' : 'none'};">Down</button>
                    <button class="edit-btn" style="display: ${editMode ? 'inline-block' : 'none'};">Edit</button>
                    <button class="delete-btn" style="display: ${editMode ? 'inline-block' : 'none'};">Delete</button>
                `;
                todoList.appendChild(li);

                const editBtn = li.querySelector('.edit-btn');
                const deleteBtn = li.querySelector('.delete-btn');
                const upBtn = li.querySelector('.up-btn');
                const downBtn = li.querySelector('.down-btn');

                editBtn.addEventListener('click', () => editTask(index));
                deleteBtn.addEventListener('click', () => deleteTask(index));
                upBtn.addEventListener('click', () => moveTaskUp(index));
                downBtn.addEventListener('click', () => moveTaskDown(index));
            });
        }

        // Function to show the modal
        function showModal() {
            taskModal.style.display = 'block';
            taskModalOverlay.style.display = 'block';
            taskInput.focus();
        }

        // Function to hide the modal
        function hideModal() {
            taskModal.style.display = 'none';
            taskModalOverlay.style.display = 'none';
            taskInput.value = '';
            isEditing = false;
            currentEditIndex = null;
        }

        // Add task
        addTaskBtn.addEventListener('click', function () {
            isEditing = false;
            showModal();
        });

        // Save task
        saveTaskBtn.addEventListener('click', function () {
            const taskName = taskInput.value.trim();
            if (taskName) {
                if (isEditing) {
                    tasks[currentEditIndex] = taskName;
                } else {
                    tasks.push(taskName);
                }
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks();
                hideModal();
            }
        });

        cancelTaskBtn.addEventListener('click', hideModal);
        taskModalOverlay.addEventListener('click', hideModal);

        // Toggle edit mode
        toggleEditBtn.addEventListener('click', function () {
            editMode = !editMode;
            toggleEditBtn.textContent = editMode ? 'View Mode' : 'Edit Mode';
            document.body.classList.toggle('edit-mode', editMode);
            renderTasks();
        });

        // Edit task
        function editTask(index) {
            isEditing = true;
            currentEditIndex = index;
            taskInput.value = tasks[index];
            showModal();
        }

        // Delete task
        function deleteTask(index) {
            tasks.splice(index, 1);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        }

        // Move task up
        function moveTaskUp(index) {
            if (index > 0) {
                [tasks[index], tasks[index - 1]] = [tasks[index - 1], tasks[index]];
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks();
            }
        }

        // Move task down
        function moveTaskDown(index) {
            if (index < tasks.length - 1) {
                [tasks[index], tasks[index + 1]] = [tasks[index + 1], tasks[index]];
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks();
            }
        }

        // New function to export tasks as a file with the current date in the filename
            function exportTasksToFile() {
                const tasks = localStorage.getItem('tasks');
                if (!tasks) {
                    alert('No tasks to export.');
                    return;
                }

                const blob = new Blob([tasks], { type: 'application/json' });
                const date = new Date().toISOString(); // YYYY-MM-DD format
                const filename = `tasks_${date}.json`;

                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
            }

            // New function to import tasks from a JSON file
            function importTasksFromFile(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const tasks = JSON.parse(e.target.result);
                        localStorage.setItem('tasks', JSON.stringify(tasks));
                        renderTasks();
                    } catch (error) {
                        alert('Failed to import tasks. Make sure the file is valid JSON.');
                        console.error(error);
                    }
                };
                reader.readAsText(file);
            }

        // Initial render of tasks
        renderTasks();

        // === Clock ===
        function updateClock() {
            var now = new Date();
            var h = String(now.getHours()).padStart(2, '0');
            var m = String(now.getMinutes()).padStart(2, '0');
            var s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('retro-clock').textContent = h + ':' + m + ':' + s;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // === Theme ===
        function applyTheme(theme) {
            document.body.className = document.body.className.replace(/theme-\S+/g, '').trim();
            if (theme !== 'default') {
                document.body.classList.add('theme-' + theme);
            }
            document.querySelectorAll('.theme-option').forEach(function(opt) {
                opt.classList.remove('active');
            });
            var activeOpt = document.getElementById('theme-' + theme + '-opt');
            if (activeOpt) activeOpt.classList.add('active');
            var radio = document.querySelector('input[name="theme"][value="' + theme + '"]');
            if (radio) radio.checked = true;
            localStorage.setItem('theme', theme);
        }
        var savedTheme = localStorage.getItem('theme') || 'default';
        applyTheme(savedTheme);

        // === Settings Panel ===
        var settingsBtn = document.getElementById('settings-btn');
        var settingsPanel = document.getElementById('settings-panel');
        settingsBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
        });
        document.addEventListener('click', function(e) {
            if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) {
                settingsPanel.style.display = 'none';
            }
        });
        document.querySelectorAll('input[name="theme"]').forEach(function(radio) {
            radio.addEventListener('change', function() {
                applyTheme(this.value);
            });
        });
    });

    (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
    (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
    m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
    })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');
    ga('create', 'UA-82393887-1', 'auto');
    ga('send', 'pageview');

    </script>
</body>
</html>
